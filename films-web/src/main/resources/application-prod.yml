spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/films}
    username: ${DB_USER:films}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
